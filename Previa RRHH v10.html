<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recursos Humanos - Gestión de Personal Crucero</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <button class="btn-return" onclick="location.href='preview.html'">Volver</button>
    <h1>Gestión de Personal para Crucero</h1>

    <section id="cruise-size-section" class="box-section">
      <h2>Selecciona tamaño del crucero</h2>
      <form id="cruiseSizeForm" class="form-simple">
        <label><input type="radio" name="cruiseSize" value="pequeño" /> Pequeño (max 320)</label>
        <label><input type="radio" name="cruiseSize" value="mediano" /> Mediano (max 480)</label>
        <label><input type="radio" name="cruiseSize" value="grande" /> Grande (max 560)</label>
        <button type="submit" class="btn">Confirmar tamaño</button>
      </form>
    </section>

    <section id="personnel-section" class="hidden">

      <h2>Personal en Stand By</h2>
      <table id="standbyTable" class="table-box">
        <thead>
          <tr>
            <th>Nombre</th><th>Apellido</th><th>Edad</th><th>Exp. (años)</th><th>Salario</th><th>Categoría</th><th>Puesto</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p id="standbyNotice" class="notice"></p>

      <h2>Personal Contratado</h2>
      <div class="top-controls">
        <button id="generateRandomBtn" class="btn">Generar Personal Aleatorio</button>
      </div>

      <form id="personnelForm" class="form-simple personnel-form box-section">
        <h3>Agregar Personal Manualmente</h3>
        <div class="form-row">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" maxlength="10" required autocomplete="off" />
        </div>
        <div class="form-row">
          <label for="apellido">Apellido:</label>
          <input type="text" id="apellido" maxlength="10" required autocomplete="off" />
        </div>
        <div class="form-row">
          <label for="edad">Edad:</label>
          <input type="number" id="edad" min="18" max="70" required />
        </div>
        <div class="form-row">
          <label for="experiencia">Experiencia (años):</label>
          <input type="number" id="experiencia" min="0" max="50" required />
        </div>
        <div class="form-row">
          <label for="salario">Salario (USD):</label>
          <input type="number" id="salario" min="100" max="99999999" step="any" required />
        </div>
        <div class="form-row">
          <label for="categoria">Categoría:</label>
          <select id="categoria" required>
            <option value="">-- Seleccione categoría --</option>
            <option value="culinario">Culinario</option>
            <option value="mantenimiento">Mantenimiento</option>
            <option value="entretenimiento">Entretenimiento</option>
            <option value="medico">Médico</option>
            <option value="administrativo">Administrativo</option>
          </select>
        </div>
        <div class="form-row">
          <label for="puesto">Puesto:</label>
          <select id="puesto" required disabled>
            <option value="">-- Seleccione puesto --</option>
          </select>
        </div>
        <button type="submit" class="btn">Agregar Personal</button>
      </form>

      <div class="filter-block">
        <label for="filterCategoria">Filtrar por Categoría:</label>
        <select id="filterCategoria">
          <option value="all">Todas</option>
          <option value="culinario">Culinario</option>
          <option value="mantenimiento">Mantenimiento</option>
          <option value="entretenimiento">Entretenimiento</option>
          <option value="medico">Médico</option>
          <option value="administrativo">Administrativo</option>
        </select>
      </div>

      <table id="personnelTable" class="table-box">
        <thead>
          <tr>
            <th>Nombre</th><th>Apellido</th><th>Edad</th><th>Exp. (años)</th><th>Salario</th><th>Categoría</th><th>Puesto</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p id="maxPersonnelNotice" class="notice"></p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
