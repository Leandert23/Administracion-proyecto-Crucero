{% extends 'layouts/base.html' %}
{% block content %}
<h2>Agregar al Inventario</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <a href="{% url 'panel_inventario' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
