{% extends 'layouts/base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <h2>Agregar Historial Médico</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'panel_inicio' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
