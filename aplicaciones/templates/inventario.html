
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
</head>
<body>
    <h1>Inventario</h1>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Insumo</th>
                <th>Cantidad</th>
                <th>Fecha de Registro</th>
            </tr>
        </thead>
        <tbody>
            {% for item in inventario %}
            <tr>
                <td>{{ item.insumo.nombre }}</td>
                <td>{{ item.cantidad }}</td>
                <td>{{ item.fecha_registro|date:'Y-m-d H:i' }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No hay insumos en inventario.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="{% url 'panel_personal_medico' %}">Volver al inicio</a>
</body>
</html>
