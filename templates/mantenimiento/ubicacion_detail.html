{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>{{ ubicacion.codigo_ubicacion }}</h2>
  <p><strong>Descripción:</strong> {{ ubicacion.descripcion }}</p>
  <p><strong>Activa:</strong> {{ ubicacion.activa|yesno:"Sí,No" }}</p>
  <div class="mt-3">
    <a class="btn btn-secondary" href="{% url 'mantenimiento:ubicacion_list' %}">Volver</a>
  </div>
</div>
{% endblock %}
