{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>Eliminar Ubicación</h2>
  <p>¿Seguro que deseas eliminar la ubicación "{{ ubicacion.codigo_ubicacion }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Eliminar</button>
    <a class="btn btn-secondary" href="{% url 'mantenimiento:ubicacion_detail' ubicacion.pk %}">Cancelar</a>
  </form>
</div>
{% endblock %}
