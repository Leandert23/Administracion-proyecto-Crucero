{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Ubicaciones</h2>
    <a class="btn btn-primary" href="{% url 'mantenimiento:ubicacion_create' %}">Nueva Ubicación</a>
  </div>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Código</th>
        <th>Descripción</th>
        <th>Activa</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for u in page_obj %}
      <tr>
        <td><a href="{% url 'mantenimiento:ubicacion_detail' u.pk %}">{{ u.codigo_ubicacion }}</a></td>
        <td>{{ u.descripcion }}</td>
        <td>{{ u.activa|yesno:"Sí,No" }}</td>
        <td>
          <a class="btn btn-sm btn-outline-secondary" href="{% url 'mantenimiento:ubicacion_update' u.pk %}">Editar</a>
          <a class="btn btn-sm btn-danger" href="{% url 'mantenimiento:ubicacion_delete' u.pk %}">Eliminar</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="4" class="text-center">Sin ubicaciones</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
