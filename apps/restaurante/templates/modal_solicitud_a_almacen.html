<style>
/* Variables localizadas para el modal (evita var() vacíos que causen transparencia) */
.modal-solicitud-almacen {
    --nav-bg: #1e293b;
    --active-btn: #3b82f6;
    --text-secondary: #8f99a7;
    --bg-primary: #f8fafc;
    --bg-white: #ffffff;
    --text-primary: #1e293b;
    --border-color: #e2e8f0;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --header-gradient: linear-gradient(135deg, #f8fafc 0%, #eef3f7 100%);
}

/* Asegurar que el diálogo tenga fondo sólido y scroll interno */
.modal-solicitud-dialog {
    background: var(--bg-white);
    width: calc(100% - 40px);
    max-width: 820px; /* ajustable */
    max-height: 90vh;
    display: flex;
    flex-direction: column;
}
.modal-solicitud-dialog .cuerpo-modal {
    padding: 20px;
    flex: 1 1 auto;
    overflow: auto; /* scroll interno del modal */
    background: var(--bg-primary);
}
/* Evitar scroll horizontal y asegurar que los elementos ocupen el ancho */
.modal-solicitud-almacen, .modal-solicitud-dialog, .cuerpo-modal {
    overflow-x: hidden;
}
.modal-solicitud-dialog, .cuerpo-modal, .formulario-solicitud {
    box-sizing: border-box;
}
.contenedor-tabla {
    width: 100%;
    max-width: 100%;
    overflow-x: auto; /* si hay contenido muy ancho, se desplaza aquí */
}
.contenedor-tabla table {
    width: 100% !important;
    table-layout: fixed; /* evita que la tabla expanda el contenedor */
    min-width: 0 !important;
}
.contenedor-tabla th, .contenedor-tabla td {
    white-space: normal;
    word-break: break-word;
}
.caja-busqueda input,
.entrada-formulario,
.area-texto-formulario,
.formulario-solicitud {
    max-width: 100%;
    box-sizing: border-box;
}

/* Centrado y apilamiento del modal */
.modal-solicitud-almacen {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.overlay-modal {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 1; /* por debajo del diálogo */
}
.contenedor-centrado {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
}
.modal-solicitud-dialog {
    position: relative;
    z-index: 2; /* por encima del overlay */
    display: flex;
    flex-direction: column;
    background: var(--bg-white);
    border-radius: 16px;
    box-shadow: 0 20px 50px -12px rgba(0,0,0,.3);
    overflow: hidden;
}

/* Barra de búsqueda (estilos importados de inventario_modal.css) */
.caja-busqueda {
    position: relative;
    display: flex;
    align-items: center;
    flex: 1;
    max-width: 500px;
}
.caja-busqueda input {
    padding: 12px 16px 12px 44px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    width: 100%;
    font-size: 0.95rem;
    background: var(--bg-white);
    transition: all 0.3s ease;
}
.caja-busqueda input:focus {
    outline: none;
    border-color: var(--active-btn);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}
.caja-busqueda i {
    position: absolute;
    left: 16px;
    color: var(--text-secondary);
    font-size: 1rem;
}

/* Encabezado y título más presentable */
.encabezado-modal {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border-color);
    background: var(--header-gradient);
}
.titulo-modal {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.2px;
}
.titulo-modal small {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: 4px;
}

/* Estilo del subtítulo dentro del formulario (h3) */
.formulario-solicitud h3,
#formularioSolicitud h3 {
    margin: 0 0 12px 0;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-primary);
}

/* Manteniendo todos los estilos anteriores, solo cambiando nombres de clases */
.modal-solicitud-almacen#modalFormSolicitudAlmacen .modal-solicitud-dialog {
    background: #fff !important;
}
.modal-solicitud-almacen#modalFormSolicitudAlmacen .modal-solicitud-body {
    background: #fff !important;
}
.modal-solicitud-almacen#modalFormSolicitudAlmacen .formulario-solicitud {
    background: #fff !important;
    opacity: 1 !important;
}

/* Resto de estilos manteniendo la misma estructura pero con nombres más descriptivos */
.grupo-formulario {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.etiqueta-formulario {
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
}

.entrada-formulario, .area-texto-formulario {
    border-radius: 8px;
    border: 2px solid #cbd5e1;
    padding: 8px 12px;
    font-size: 1rem;
    background: #f1f5f9;
    color: var(--text-primary);
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(30,41,59,0.06);
    font-family: inherit; /* asegurar misma fuente que otros inputs */
}

/* ... resto de estilos con nombres refactorizados ... */

@media (max-width: 968px) {
    .modal-solicitud-dialog { max-height: 95vh; }
    .contenedor-filtros { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 768px) {
    .modal-solicitud-almacen { padding: 10px; }
    .contenedor-acciones { flex-direction: column; align-items: stretch; }
    .caja-busqueda { width: 100%; max-width: none; }
    .botones-accion { width: 100%; justify-content: space-between; }
    .boton { flex: 1; justify-content: center; }
    .encabezado-modal { padding: 16px 20px; }
    .titulo-modal { font-size: 1.3rem; }
}

@media (max-width: 480px) {
    .contenedor-inventario { padding: 16px; }
    .filtros { width: 100%; justify-content: center; }
    .boton-filtro { flex: 1; justify-content: center; min-width: 0; padding: 8px 12px; }
    .pie-tabla { flex-direction: column; align-items: center; }
    .paginacion { width: 100%; justify-content: center; }
}

/* Evitar scroll lateral en el modal y asegurar el botón cerrar en la esquina superior izquierda */
.modal-solicitud-dialog,
.cuerpo-modal {
    overflow-x: hidden;
}
.contenedor-tabla {
    overflow-x: auto; /* si la tabla es ancha, el scroll se hará dentro de este contenedor */
    -webkit-overflow-scrolling: touch;
}
.boton-cerrar-modal {
    position: absolute;
    top: 10px;
    right: 10px;
    left: auto;
    background: #f1f5f9;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #64748b;
    padding: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: all 0.2s ease;
    z-index: 4; /* por encima del diálogo */
}
.boton-cerrar-modal:hover { background: #e2e8f0; color: #475569; transform: translateY(-2px); box-shadow: 0 4px 10px -4px rgba(0,0,0,.25); }

/* Estilo refinado para el texto del filtro activo (sin icono) */
#textoFiltroActivo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    background: rgba(30,41,59,0.04);
    padding: 6px 10px;
    border-radius: 999px;
    box-shadow: 0 1px 2px rgba(16,24,40,0.04);
    line-height: 1;
    font-weight: 500;
}

/* Ajustes específicos para el modal de formulario: textarea con altura
   fija y sin redimensionado (scopeado a este modal para evitar afectar
   otros formularios). */
#modalFormularioSolicitud .entrada-formulario {
    width: 100%; /* mantener ancho responsivo dentro del modal */
    box-sizing: border-box;
}
#modalFormularioSolicitud .area-texto-formulario {
    width: 100%; /* ocupar el mismo ancho disponible que el input */
    box-sizing: border-box;
    height: 72px; /* altura vertical fija */
    resize: none; /* deshabilitar redimensionado */
}

/* Textarea del formulario inline (no modal) - altura fija y sin resize */
#formularioSolicitud textarea.control-formulario {
    height: 72px;
    resize: none;
    box-sizing: border-box;
    font-family: inherit; /* coincidir con inputs */
}

/* Estilos de botones adaptados desde inventario_modal.css pero usando las
   clases locales (.boton, .boton-primario, .boton-secundario) para evitar
   depender de la clase genérica .btn del proyecto. */
.boton {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.9rem;
    border: 1px solid var(--border-color);
    background: var(--bg-white);
    color: var(--text-primary);
    transition: all 0.2s ease;
}
.boton-primario {
    background: var(--active-btn);
    border-color: var(--active-btn);
    color: #ffffff;
}
.boton-primario:hover {
    background: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px -6px rgba(37,99,235,0.4);
}
.boton-secundario:hover {
    background: #f1f5f9;
}

/* Asegurar separación y alineación en las acciones del formulario */
.acciones-formulario {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    margin-bottom: 0; /* evitar espacio extra debajo de los botones */
}

/* Reducir el espacio en blanco por debajo de los botones en el modal compacto */
#modalFormularioSolicitud .modal-solicitud-dialog {
    height: auto !important; /* quitar la altura fija definida inline */
    max-height: 90vh;
}
#modalFormularioSolicitud .cuerpo-modal {
    padding-bottom: 12px !important; /* menos espacio inferior dentro del cuerpo */
}
#modalFormularioSolicitud .formulario-solicitud {
    margin-bottom: 0; /* asegurar que el formulario no añada margen inferior */
}
#modalFormularioSolicitud #retroalimentacionSolicitudModal {
    margin-top: 8px !important; /* menos separación hacia el footer del modal */
}

<script>
// =============================================================================
// CONSTANTES Y CONFIGURACIÓN
// =============================================================================
const TIPOS_PRODUCTO_PERMITIDOS = ["ALIMENTOS_FRESCOS", "ALIMENTOS_SECOS", "BEBIDAS", "INSUMOS_COCINA"]

const ENDPOINTS = {
    PRODUCTOS: '/almacen/obtener_productos_para_solicitud/',
    SOLICITUD: '/almacen/solicitar_productos/'
};

// Módulo que será enviado al backend para marcar el movimiento
const MODULO_DESTINO = 'RESTAURANTE';

const SELECTORES = {
    MODAL_PRINCIPAL: '#modalSolicitudAlmacen',
    MODAL_FORMULARIO: '#modalFormularioSolicitud',
    INPUT_BUSQUEDA: '#inputBusquedaProductos',
    CONTENEDOR_TABLA: '#contenedorTablaProductos',
    CONTENEDOR_FILTROS: '#contenedorFiltros',
    PIE_TABLA: '#pieTablaProductos',
    FORMULARIO_MODAL: '#formularioSolicitudModal',
    TEXTO_FILTRO_ACTIVO: '#textoFiltroActivo',
    RETROALIMENTACION_MODAL: '#retroalimentacionSolicitudModal'
};

// =============================================================================
// ESTADO GLOBAL
// =============================================================================
const EstadoSolicitud = {
    productoSeleccionado: null,
    filtroActual: null,
    busquedaActual: '',
    paginaActual: 1
};

// =============================================================================
// UTILIDADES
// =============================================================================
const Utilidades = {
    obtenerTokenCSRF() {
        return window.CSRF_TOKEN || '';
    },
    
    mostrarError(elemento, mensaje) {
        elemento.innerHTML = `<span style="color:var(--danger);">${mensaje}</span>`;
    },
    
    mostrarExito(elemento, mensaje) {
        elemento.innerHTML = `<span style="color:var(--success);">${mensaje}</span>`;
    },
    
    limpiarRetroalimentacion(elemento) {
        elemento.innerHTML = '';
    },
    
    construirParametrosBusqueda(filtro, busqueda, pagina) {
        const params = new URLSearchParams();
        TIPOS_PRODUCTO_PERMITIDOS.forEach(tipo => params.append('tipos', tipo));
        if (filtro) params.set('tipo', filtro);
        if (busqueda) params.set('busqueda', busqueda);
        if (pagina) params.set('page', pagina);
        return params;
    }
};

// =============================================================================
// SERVICIO DE API
// =============================================================================
const ApiService = {
    async obtenerProductos(filtro = null, busqueda = '', pagina = 1) {
        try {
            const parametros = Utilidades.construirParametrosBusqueda(filtro, busqueda, pagina);
            const respuesta = await fetch(`${ENDPOINTS.PRODUCTOS}?${parametros.toString()}`);
            return await respuesta.json();
        } catch (error) {
            console.error('Error obteniendo productos:', error);
            throw new Error('No se pudieron cargar los productos');
        }
    },
    
    async enviarSolicitud(datosSolicitud) {
        try {
            // Asegurar que el campo 'modulo' esté presente en el FormData
            if (datosSolicitud instanceof FormData) {
                if (!datosSolicitud.get('modulo')) datosSolicitud.append('modulo', MODULO_DESTINO);
            }

            const respuesta = await fetch(ENDPOINTS.SOLICITUD, {
                method: 'POST',
                body: datosSolicitud,
                headers: { 
                    'X-CSRFToken': Utilidades.obtenerTokenCSRF() 
                }
            });
            return await respuesta.json();
        } catch (error) {
            console.error('Error enviando solicitud:', error);
            throw new Error('Error al enviar la solicitud');
        }
    }
};

// =============================================================================
// MANEJO DE LA INTERFAZ
// =============================================================================
const InterfazSolicitud = {
    inicializar() {
        this.configurarEventos();
        this.cargarProductos();
    },
    
    configurarEventos() {
        // Evento de búsqueda
        document.querySelector(SELECTORES.INPUT_BUSQUEDA).addEventListener('input', (evento) => {
            EstadoSolicitud.busquedaActual = evento.target.value;
            EstadoSolicitud.paginaActual = 1;
            this.cargarProductos();
        });
        
        // Evento de envío del formulario
        document.querySelector(SELECTORES.FORMULARIO_MODAL).addEventListener('submit', (evento) => {
            evento.preventDefault();
            this.procesarSolicitud(evento.target);
        });
        
        // Eventos de cierre de modales
        this.configurarEventosCierre();
    },
    
    configurarEventosCierre() {
        // Cerrar modal principal
        document.querySelectorAll(`${SELECTORES.MODAL_PRINCIPAL} [data-cerrar-modal]`).forEach(boton => {
            boton.addEventListener('click', () => this.cerrarModalPrincipal());
        });
        
        // Cerrar modal de formulario
        document.querySelectorAll(`${SELECTORES.MODAL_FORMULARIO} [data-cerrar-formulario]`).forEach(boton => {
            boton.addEventListener('click', () => this.cerrarModalFormulario());
        });
        
        // Botón cancelar
        document.getElementById('botonCancelarSolicitudModal').addEventListener('click', () => {
            this.cerrarModalFormulario();
        });
    },
    
    async cargarProductos() {
        try {
            const datos = await ApiService.obtenerProductos(
                EstadoSolicitud.filtroActual,
                EstadoSolicitud.busquedaActual,
                EstadoSolicitud.paginaActual
            );
            
            if (datos.success) {
                this.actualizarInterfazProductos(datos);
            } else {
                throw new Error(datos.mensaje || 'Error al cargar productos');
            }
        } catch (error) {
            Utilidades.mostrarError(document.getElementById('retroalimentacionSolicitud'), error.message);
        }
    },
    
    actualizarInterfazProductos(datos) {
        document.querySelector(SELECTORES.CONTENEDOR_TABLA).innerHTML = datos.tabla_html || '';
        document.querySelector(SELECTORES.PIE_TABLA).innerHTML = datos.paginacion_html || '';
        
        this.configurarEventosTabla();
        this.configurarPaginacion();
    },
    
    configurarEventosTabla() {
        const contenedorTabla = document.querySelector(SELECTORES.CONTENEDOR_TABLA);
        
        // Usar delegación de eventos para los botones de solicitar (acepta ambas clases)
        contenedorTabla.addEventListener('click', (evento) => {
            const botonSolicitar = evento.target.closest('.boton-solicitar-producto, .btn-solicitar-producto');
            if (botonSolicitar) {
                this.seleccionarProducto(botonSolicitar);
            }
        });
    },
    
    configurarPaginacion() {
        // aceptar tanto la clase legacy .boton-paginacion como .pagination-btn usada en plantillas
        const botones = document.querySelectorAll(`${SELECTORES.PIE_TABLA} .boton-paginacion, ${SELECTORES.PIE_TABLA} .pagination-btn`);
        botones.forEach(boton => {
            // ignorar botones deshabilitados
            if (boton.disabled) return;
            boton.addEventListener('click', (evento) => {
                evento.preventDefault();

                // 1) Intentar leer dataset.data-page
                let pageAttr = boton.dataset.page || boton.getAttribute('data-page');

                // 2) Si no existe, intentar extraer el número del atributo onclick (p.e. cargarPagina('3'))
                if (!pageAttr) {
                    const onclick = boton.getAttribute('onclick') || '';
                    const m = onclick.match(/\(\s*['"]?(\d+)['"]?\s*\)/);
                    if (m) pageAttr = m[1];
                }

                // 3) Si sigue sin page, intentar usar el texto del botón si es numérico
                if (!pageAttr) {
                    const txt = (boton.textContent || '').trim();
                    if (/^\d+$/.test(txt)) pageAttr = txt;
                }

                if (!pageAttr) return; // no hay página válida

                EstadoSolicitud.paginaActual = parseInt(pageAttr, 10);
                this.cargarProductos();
            });
        });
    },
    
    seleccionarProducto(boton) {
        EstadoSolicitud.productoSeleccionado = {
            id: boton.dataset.id,
            nombre: boton.dataset.nombre
        };
        
        document.getElementById('idProductoSolicitudModal').value = EstadoSolicitud.productoSeleccionado.id;
        document.querySelector(SELECTORES.FORMULARIO_MODAL).reset();
        this.mostrarModalFormulario();
    },
    
    async procesarSolicitud(formulario) {
        Utilidades.limpiarRetroalimentacion(document.querySelector(SELECTORES.RETROALIMENTACION_MODAL));
        
        try {
            const datosFormulario = new FormData(formulario);
            const resultado = await ApiService.enviarSolicitud(datosFormulario);
            
            if (resultado.success) {
                this.solicitudExitosa();
            } else {
                Utilidades.mostrarError(
                    document.querySelector(SELECTORES.RETROALIMENTACION_MODAL),
                    resultado.mensaje || 'Error al procesar la solicitud'
                );
            }
        } catch (error) {
            Utilidades.mostrarError(
                document.querySelector(SELECTORES.RETROALIMENTACION_MODAL),
                error.message
            );
        }
    },
    
    solicitudExitosa() {
        this.cerrarModalFormulario();
        Utilidades.mostrarExito(
            document.getElementById('retroalimentacionSolicitud'),
            'Solicitud realizada correctamente.'
        );
        this.cargarProductos();
    },
    
    mostrarModalFormulario() {
        document.querySelector(SELECTORES.MODAL_FORMULARIO).style.display = '';
    },
    
    cerrarModalFormulario() {
        document.querySelector(SELECTORES.MODAL_FORMULARIO).style.display = 'none';
        document.querySelector(SELECTORES.FORMULARIO_MODAL).reset();
        EstadoSolicitud.productoSeleccionado = null;
    },
    
    cerrarModalPrincipal() {
        document.querySelector(SELECTORES.MODAL_PRINCIPAL).style.display = 'none';
    },
    
    abrirModalPrincipal() {
        this.reiniciarEstado();
        this.cargarProductos();
        document.querySelector(SELECTORES.MODAL_PRINCIPAL).style.display = '';
    },
    
    reiniciarEstado() {
        EstadoSolicitud.productoSeleccionado = null;
        EstadoSolicitud.filtroActual = null;
        EstadoSolicitud.busquedaActual = '';
        EstadoSolicitud.paginaActual = 1;
        
        document.querySelector(SELECTORES.INPUT_BUSQUEDA).value = '';
        Utilidades.limpiarRetroalimentacion(document.getElementById('retroalimentacionSolicitud'));
    }
};

// =============================================================================
// INICIALIZACIÓN
// =============================================================================
document.addEventListener('DOMContentLoaded', () => {
    InterfazSolicitud.inicializar();
});

// Exponer función global para abrir el modal
window.abrirModalSolicitudAlmacen = () => {
    InterfazSolicitud.abrirModalPrincipal();
};
</script>
