{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard de Administración - Empresa{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  {% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/styles_admin_dashboard.css' %}">
  {% endblock %}
</head>
<body>
  <div class="container" style="display: flex; height: 100vh; min-height: 100vh;">
    <aside class="sidebar">
      <div class="logo">
        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo-icon">
        <span class="logo-text">CruiseAdmin</span>
      </div>
      
      <div class="ship-status-images" style="margin-bottom: 20px; text-align: center;">
        <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=100&h=60&fit=crop" alt="Crucero Activo" style="width: 80px; height: 50px; border-radius: 8px; margin: 5px;">
        <img src="https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=100&h=60&fit=crop" alt="Crucero en Mantenimiento" style="width: 80px; height: 50px; border-radius: 8px; margin: 5px;">
      </div>
    </aside>
  </div>

{% block extra_js %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{% static 'js/empresa.js' %}"></script>
  <script> 
    // Pasar datos del contexto de Django al JavaScript
    window.djangoContext = {
      total_costos: { total_costos },
      costos_por_crucero: { costos_por_crucero },
      total_ganancias: { total_ganancias },
      ganancias_por_crucero: { ganancias_por_crucero },
      ubicaciones_cruceros: { ubicaciones_cruceros },
      alertas: { alertas },
      conteo_cruceros_por_estado: { conteo_cruceros_por_estado }
    };
    
    // Inicializar cuando el DOM esté cargado
    document.addEventListener('DOMContentLoaded', function() {
      // Los datos ya están disponibles en window.djangoContext
      renderAllShips();
    });
  </script>
{% endblock %}
</body>
</html>
