{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizar Evento</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f3f4f6; }
    .header {
      background: #0d3b66; color: white; padding: 15px 25px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .title { font-size: 1.6rem; font-weight: 600; }
    .btn { background: #3b82f6; padding: 10px 18px; border-radius: 6px;
           color: white; text-decoration: none; font-weight: 500; }
    .btn:hover { background: #2563eb; }

    .container {
      max-width: 600px; margin: 40px auto; padding: 25px;
      background: white; border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    .container h2 {
      text-align: center; margin-bottom: 25px;
      font-weight: 600; color: #1e293b;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-weight: 500; margin-bottom: 8px; color: #374151;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 14px;
    }
    textarea { resize: vertical; min-height: 100px; }
    .submit-btn {
      width: 100%; padding: 14px; border: none; border-radius: 8px;
      background: #2563eb; color: white; font-weight: 600; cursor: pointer;
      transition: background 0.3s ease;
    }
    .submit-btn:hover { background: #1e40af; }
  </style>
</head>
<body>
  <header class="header">
    <div>
      <div class="title">Organizar Evento</div>
      <div>Crucero: {{ crucero|title }}</div>
    </div>
    <a href="{% url 'reservas' %}" class="btn">⬅ Volver</a>
  </header>

  <div class="container">
    <h2>Complete el formulario para su evento personalizado</h2>
    <form method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="nombre">Nombre del Evento</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Noche de Bodas" required>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" placeholder="Explique los detalles de su evento" required></textarea>
      </div>

      <div class="form-group">
        <label for="materiales">Materiales (máx. 10)</label>
        <textarea id="materiales" name="materiales" placeholder="Ejemplo: Flores, Velas, Música en vivo"></textarea>
      </div>

      <div class="form-group">
        <label for="dia">Día del evento</label>
        <select id="dia" name="dia" required>
          {% for d in dias %}
            <option value="{{ d }}">Día {{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="submit-btn">📌 Guardar Evento</button>
    </form>
  </div>
</body>
</html>
