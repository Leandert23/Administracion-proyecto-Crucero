{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurantes - {{ crucero|title }}</title>
  <style>
    /* Estilos base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; }
    
    .reservas-bg {
      background: linear-gradient(135deg, #093958 0%, #11406b 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .reservas-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d3b66;
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .reservas-title { font-size: 1.8rem; font-weight: 600; }
    .reservas-subtitle { font-size: 1rem; opacity: 0.8; }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    
    .reservas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .reserva-card {
      background: #f6fafd;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(9,57,88,0.12);
      padding: 24px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .reserva-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(9,57,88,0.18);
    }
    .reserva-card h3 { margin-bottom: 15px; color: #1e293b; font-weight: 600; }
    
    .reserva-card a {
      display: inline-block;
      padding: 10px 18px;
      background: #224faa;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s ease;
    }
    .reserva-card a:hover { background: #1e40af; }
    
    /* Contenedor para los botones con separación */
    .botones-separados {
      display: flex;
      flex-direction: column;
      gap: 15px; /* Separación entre botones */
      margin-top: 20px;
    }
    
    @media (max-width: 768px) {
      .reservas-header { flex-direction: column; text-align: center; gap: 15px; }
      .reservas-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="reservas-bg">

  <header class="reservas-header">
    <div>
      <h1 class="reservas-title">Catálogo de Restaurantes</h1>
      <p class="reservas-subtitle">
        Crucero: {{ crucero|title }}
      </p>
    </div>
    <a href="{% url 'reservas' %}" class="btn-primary">⬅ Volver a Reservas</a>
  </header>

  <div class="botones-separados">
    <div class="reserva-card">
      <h3>L'odissea della Toscana</h3>
      <a href="{% url 'primer_restaurante' crucero=crucero %}">
        <button>Ver Mesas</button>
      </a>
    </div>

    <div class="reserva-card">
      <h3>Odessa Al-Bahr</h3>
      <a href="{% url 'segundo_restaurante' crucero=crucero %}">
        <button>Ver Mesas</button>
      </a>
    </div>
  </div>

</body>
</html>
