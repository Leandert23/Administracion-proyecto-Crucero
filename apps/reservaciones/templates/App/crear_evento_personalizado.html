<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Organizar Evento</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="reservas-bg">

  <header class="reservas-header">
    <div>
      <h1 class="reservas-title">Organizar Evento</h1>
      <p class="reservas-subtitle">Crucero: {{ crucero|title }}</p>
    </div>
    <div class="user-info">
      <a href="{% url 'catalogo_eventos' crucero %}">
        <button class="btn-primary">⬅ Volver a Eventos</button>
      </a>
    </div>
  </header>

  <div class="form-container">
    <form method="post" class="reserva-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="nombre">Nombre del evento</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
      </div>

      <div class="form-group">
        <label for="materiales">Materiales necesarios</label>
        <textarea id="materiales" name="materiales" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label for="dia">Día del evento (1 a 8)</label>
        <input type="number" id="dia" name="dia" min="1" max="8" required>
      </div>

      <button type="submit" class="btn-primary">Crear Evento</button>
    </form>
  </div>

</body>
</html>
