<style>
/* Inspirado en inventario_modal.css - modal para solicitudes aprobadas */
.modal-solicitudes-aprobadas { position: fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:1400; }
.modal-solicitudes-aprobadas.active { display:flex; }
.msa-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.45); z-index:1; }
.msa-dialog { position:relative; z-index:2; width:90vw; max-width:1200px; height:80vh; background:#fff; border-radius:12px; box-shadow:0 20px 50px rgba(0,0,0,0.25); display:flex; flex-direction:column; overflow:hidden; }
.msa-header { padding:14px 18px; border-bottom:1px solid #e6eef6; background:linear-gradient(135deg,#f8fafc,#eef3f7); display:flex; align-items:center; justify-content:space-between; }
.msa-title { font-size:1.25rem; font-weight:700; color:#0b1220; }
.msa-body { padding:12px 14px; overflow:auto; flex:1 1 auto; background:#f8fafc; }
.msa-table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 6px 18px rgba(2,6,23,0.04); }
.msa-table th, .msa-table td { padding:12px 14px; border-bottom:1px solid #e6eef6; text-align:left; font-size:0.95rem; }
.msa-table th { font-weight:700; font-size:1rem; }
.msa-footer { padding:10px 14px; border-top:1px solid #e6eef6; display:flex; justify-content:flex-end; gap:8px; }
.msa-btn { padding:8px 12px; border-radius:8px; border:1px solid #e6eef6; background:#fff; cursor:pointer; }
.msa-deliver { background:linear-gradient(90deg,#0ea5a4,#0b9489); color:#fff; border-color:transparent; }
.msa-view { background:#eef2ff; color:#3730a3; border-color:transparent; }
.msa-table-container { padding:12px; }
.msa-small { font-size:0.9rem; color:#475569; }
/* ensure no horizontal scroll */
.msa-dialog, .msa-body { overflow-x: hidden; }

/* Preview modal: prevent horizontal scrollbar and make tables wrap */
#modalPreviewLotes .msa-body { overflow-x: hidden; }
#modalPreviewLotes .msa-body table { width:100%; table-layout: fixed; border-collapse: collapse; }
#modalPreviewLotes .msa-body th, #modalPreviewLotes .msa-body td {
    white-space: normal;      /* allow wrapping */
    word-break: break-word;   /* break long words */
    overflow-wrap: anywhere;  /* better wrapping for long strings */
}

/* Stronger rules to prevent any horizontal overflow */
#modalPreviewLotes, #modalPreviewLotes .msa-dialog, #modalPreviewLotes .msa-body { overflow-x: hidden !important; }
#modalPreviewLotes .msa-dialog { box-sizing: border-box; max-width: calc(100vw - 40px); }
#modalPreviewLotes .msa-body { padding-left:8px; padding-right:8px; }
#modalPreviewLotes .msa-body table { margin:0; }
#modalPreviewLotes .msa-body th, #modalPreviewLotes .msa-body td { min-width: 0; }
</style>

<!-- Modal: listado de solicitudes APROBADAS para entrega -->
<div id="modalSolicitudesAprobadas" class="modal-solicitudes-aprobadas" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="msa-overlay" data-close-msa="true"></div>
    <div class="msa-dialog" role="document">
        <div class="msa-header">
            <div class="msa-title">Solicitudes Aprobadas - Entrega</div>
            <div>
                <button type="button" class="msa-btn" data-close-msa="true" aria-label="Cerrar">✕</button>
            </div>
        </div>
        <div class="msa-body">
            <div class="msa-table-container">
                <table id="tablaSolicitudesAprobadas" class="msa-table" role="grid">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Solicitante</th>
                            <th>Unidades</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- filas inyectadas por JS -->
                    </tbody>
                </table>
            </div>
            <div id="paginacionSolicitudesAprobadas"></div>
        </div>
        <div class="msa-footer">
            <button type="button" class="msa-btn" data-close-msa="true">Cerrar</button>
        </div>
    </div>
</div>

<!-- Modal detalle reutilizable (usa el mismo endpoint de detalle existente) -->
<div id="modalDetalleEntrega" class="modal-solicitudes-aprobadas" role="dialog" aria-modal="true" aria-hidden="true" style="display:none;">
    <div class="msa-overlay" data-close-detalle-entrega="true"></div>
    <div class="msa-dialog" role="document" style="max-width:900px; height:70vh; overflow-x:hidden;">
        <div class="msa-header">
            <div class="msa-title">Detalle de Solicitud</div>
            <div>
                <button type="button" class="msa-btn" data-close-detalle-entrega="true">✕</button>
            </div>
        </div>
        <div class="msa-body" style="background:#fff;">
            <div id="detalleSolicitudesAprobadas">Cargando...</div>
        </div>
        <div class="msa-footer">
            <button type="button" class="msa-btn" data-close-detalle-entrega="true">Cerrar</button>
        </div>
    </div>
</div>

<script>
// Helpers
function getEmbarcacionIdFromPage(){
    const root = document.getElementById('almacen-root');
    return root ? root.dataset.embarcacionId : null;
}

// Obtener CSRF token de cookie (robusto)
function getCSRFToken(){
    try{
        const name = 'csrftoken=';
        const decoded = decodeURIComponent(document.cookie || '');
        const parts = decoded.split(';');
        for(let p of parts){
            p = p.trim();
            if(p.startsWith(name)) return p.substring(name.length);
        }
    }catch(e){}
    return '';
}

// Open/close modal
window.abrirSolicitudesAprobadas = function(){
    const el = document.getElementById('modalSolicitudesAprobadas');
    if(!el) return;
    el.classList.add('active'); el.setAttribute('aria-hidden','false');
    cargarSolicitudesAprobadas(1);
    // start polling every 2 minutes
    if(window._msa_poll_interval) clearInterval(window._msa_poll_interval);
    window._msa_poll_interval = setInterval(()=>{
        // only poll if modal still open
        if(document.getElementById('modalSolicitudesAprobadas') && document.getElementById('modalSolicitudesAprobadas').classList.contains('active')){
            cargarSolicitudesAprobadas();
        }
    }, 120000);
};

window.cerrarSolicitudesAprobadas = function(){
    const el = document.getElementById('modalSolicitudesAprobadas');
    if(!el) return;
    el.classList.remove('active'); el.setAttribute('aria-hidden','true');
    if(window._msa_poll_interval){ clearInterval(window._msa_poll_interval); window._msa_poll_interval = null; }
};

// close handlers
document.addEventListener('click', function(e){
    const t = e.target;
    if(t && (t.dataset && (t.dataset.closeMsa === 'true' || t.getAttribute('data-close-msa') === 'true'))){ cerrarSolicitudesAprobadas(); }
    if(t && (t.dataset && (t.dataset.closeDetalleEntrega === 'true' || t.getAttribute('data-close-detalle-entrega') === 'true'))){
        const md = document.getElementById('modalDetalleEntrega'); if(md){ md.classList.remove('active'); md.style.display='none'; md.setAttribute('aria-hidden','true'); }
    }
});

// Delegated click actions for this modal
document.addEventListener('click', function(e){
    const btn = e.target.closest && e.target.closest('[data-msa-action]');
    if(!btn) return;
    const action = btn.dataset.msaAction;
    const id = btn.dataset.msaId;
    if(action === 'ver'){
        mostrarDetalleAprobada(id);
    } else if(action === 'entregar'){
    // Abrir preview de lotes en lugar de entrega directa
    try{ mostrarPreviewLotes(id); } catch(e) { /* fallback a entrega directa */ entregarSolicitud(id); }
    }
});

function cargarSolicitudesAprobadas(page=1){
    const cont = document.querySelector('#modalSolicitudesAprobadas .msa-table-container');
    if(!cont) return;
    cont.innerHTML = '<div style="padding:12px;">Cargando...</div>';
    const embarcacionId = getEmbarcacionIdFromPage();
    const url = `/almacen/solicitudes/aprobadas/?page=${page}` + (embarcacionId ? `&embarcacion_id=${embarcacionId}` : '');
    fetch(url)
        .then(r => r.ok ? r.text() : r.text().then(t=>{ throw new Error('server '+r.status+': '+t); }))
        .then(txt => {
            let data;
            try{ data = JSON.parse(txt); }catch(e){ console.error('Invalid JSON', txt); cont.innerHTML = '<div style="padding:12px;color:#b91c1c;">Respuesta inválida del servidor.</div>'; return; }
            if(!data.success){ cont.innerHTML = '<div style="padding:12px;color:#b91c1c;">No se pudieron cargar las solicitudes.</div>'; return; }
            const html = (data.tabla_html||'').trim();
            const existingTbody = cont.querySelector('tbody');
            if(html.startsWith('<table') || html.startsWith('<TABLE')){ cont.innerHTML = html; } else if(existingTbody){ existingTbody.innerHTML = html; } else { cont.innerHTML = html; }
            const pagEl = document.getElementById('paginacionSolicitudesAprobadas'); if(pagEl) pagEl.innerHTML = data.paginacion_html||'';
        }).catch(err => { console.error('Error cargando aprobadas', err); });
}

window.cargarPaginaSolicitudesAprobadas = function(page){ cargarSolicitudesAprobadas(page); }

function mostrarDetalleAprobada(id){
    const modal = document.getElementById('modalDetalleEntrega');
    const contenido = document.getElementById('detalleSolicitudesAprobadas');
    if(!modal || !contenido) return;
    contenido.innerHTML = 'Cargando...';
    modal.style.display = ''; modal.classList.add('active'); modal.setAttribute('aria-hidden','false');
    fetch(`/almacen/solicitudes/detalle/${id}/`)
        .then(r => r.ok ? r.json() : Promise.reject('server error'))
        .then(data => { if(data && data.success) contenido.innerHTML = data.html || '<div>No hay detalle.</div>'; else contenido.innerHTML = '<div style="color:#b91c1c;">No se pudo obtener detalle.</div>'; })
        .catch(err => { console.error('detalle err', err); contenido.innerHTML = '<div style="color:#b91c1c;">Error cargando detalle.</div>'; });
}

function entregarSolicitud(id){
    const csrftoken = getCSRFToken();
    fetch('/almacen/solicitudes/entregar/', {
        method: 'POST', headers: {'Content-Type':'application/json','X-CSRFToken':csrftoken}, body: JSON.stringify({id: id})
    }).then(r => {
        if(!r.ok) return r.text().then(text => { throw { status: r.status, text }; });
        return r.json();
    }).then(data => {
        if(data && data.success){
            cargarSolicitudesAprobadas();
            // refrescar historial de movimientos si el gestor está disponible
            try {
                if (window.GestorHistorial && typeof window.GestorHistorial.cargarPagina === 'function') {
                    setTimeout(() => { try { window.GestorHistorial.cargarPagina(window.GestorHistorial.paginaActual || 1); } catch(e){} }, 220);
                }
            } catch(e) {}
            alert('Entrega registrada');
        } else alert('No fue posible registrar la entrega: ' + (data && data.error? data.error : 'error'));
    }).catch(err => {
        console.error('Error entregar', err);
        if(err && err.status === 403){
            // probable problema CSRF
            console.error('Server returned HTML:', err.text);
            alert('Error CSRF o de permisos al registrar la entrega. Refresca la página e inténtalo de nuevo.');
        } else if(err && err.text){
            alert('Error del servidor: revisa la consola para más detalles.');
        } else {
            alert('Error al registrar entrega');
        }
    });
}

</script>

<!-- Modal preview de lotes antes de confirmar entrega -->
<div id="modalPreviewLotes" class="modal-solicitudes-aprobadas" role="dialog" aria-modal="true" aria-hidden="true" style="display:none;">
    <div class="msa-overlay" data-close-preview="true"></div>
    <div class="msa-dialog" role="document" style="max-width:900px; height:70vh;">
        <div class="msa-header">
            <div class="msa-title">Vista previa de lotes - Entrega</div>
            <div><button type="button" class="msa-btn" data-close-preview="true">✕</button></div>
        </div>
    <div class="msa-body" style="background:#fff; overflow-y:auto; overflow-x:hidden;">
            <div id="previewLotesContenido">Cargando...</div>
        </div>
        <div class="msa-footer">
            <button type="button" class="msa-btn" data-close-preview="true">Cancelar</button>
            <button type="button" class="msa-btn msa-deliver" id="confirmarEntregaBtn">Confirmar entrega</button>
        </div>
    </div>
</div>

<script>
// Mostrar preview: fetch al endpoint y renderizar tabla agrupada por producto
function mostrarPreviewLotes(solicitudId){
    const modal = document.getElementById('modalPreviewLotes');
    const contenido = document.getElementById('previewLotesContenido');
    if(!modal || !contenido) return;
    contenido.innerHTML = '<div style="padding:12px;">Cargando asignaciones...</div>';
    modal.style.display = ''; modal.classList.add('active'); modal.setAttribute('aria-hidden','false');

    fetch(`/almacen/solicitudes/entrega_preview/${solicitudId}/`)
        .then(r => r.ok ? r.json() : r.text().then(t => Promise.reject(t)))
        .then(data => {
            if(!data || !data.success){ contenido.innerHTML = '<div style="color:#b91c1c;padding:12px;">No se pudo obtener la previsualización.</div>'; return; }
            const items = data.preview || [];
            if(items.length === 0){ contenido.innerHTML = '<div style="padding:12px;">Sin productos en esta solicitud.</div>'; return; }

            let html = '<div style="padding:8px 12px;"><small class="msa-small">Asignación sugerida por lote (basada en disponibilidad actual). La entrega final puede fallar si el stock cambia.</small></div>';
            html += '<div style="padding:8px 12px;">';
            items.forEach(prod => {
                html += `<h4 style="margin:8px 0 4px 0;">${prod.nombre} — solicitado: ${prod.total_solicitado} ${prod.unidad || ''} ${prod.insuficiente?'<span style="color:#b91c1c;">(Insuficiente)</span>':''}</h4>`;
                html += '<table style="width:100%;border-collapse:collapse;margin-bottom:12px"><thead><tr><th style="text-align:left;padding:6px">Lote</th><th style="text-align:left;padding:6px">Cantidad</th><th style="text-align:left;padding:6px">Ubicación</th></tr></thead><tbody>';
                (prod.asignaciones||[]).forEach(a => {
                    html += `<tr><td style="padding:6px">${a.numero_lote || a.lote_id}</td><td style="padding:6px">${a.cantidad}</td><td style="padding:6px">${a.ubicacion || ''}</td></tr>`;
                });
                html += '</tbody></table>';
            });
            html += '</div>';
            contenido.innerHTML = html;

            // Wire confirmar button to call entregar with the solicitud id
            const btn = document.getElementById('confirmarEntregaBtn');
            btn.dataset.solicitudId = solicitudId;
        }).catch(err => {
            console.error('error preview', err);
            contenido.innerHTML = '<div style="color:#b91c1c;padding:12px;">Error al obtener la previsualización.</div>';
        });
}

// Delegated click for preview confirm and close
document.addEventListener('click', function(e){
    const t = e.target;
    if(t && (t.dataset && (t.dataset.closePreview === 'true' || t.getAttribute('data-close-preview') === 'true'))){
        const md = document.getElementById('modalPreviewLotes'); if(md){ md.classList.remove('active'); md.style.display='none'; md.setAttribute('aria-hidden','true'); }
    }
    if(t && t.id === 'confirmarEntregaBtn'){
        const sid = t.dataset.solicitudId;
        if(!sid) return alert('Solicitud no identificada');
        // Deshabilitar mientras se procesa
        t.disabled = true; t.textContent = 'Procesando...';
        const csrftoken = getCSRFToken();
        fetch('/almacen/solicitudes/entregar/', { method: 'POST', headers: {'Content-Type':'application/json','X-CSRFToken':csrftoken}, body: JSON.stringify({id: sid}) })
            .then(r => {
                if(!r.ok) return r.text().then(text => { throw { status: r.status, text }; });
                return r.json();
            })
            .then(data => {
                t.disabled = false; t.textContent = 'Confirmar entrega';
                const md = document.getElementById('modalPreviewLotes'); if(md){ md.classList.remove('active'); md.style.display='none'; md.setAttribute('aria-hidden','true'); }
                if(data && data.success){
                    cargarSolicitudesAprobadas();
                    try { if (window.GestorHistorial && typeof window.GestorHistorial.cargarPagina === 'function') setTimeout(()=>{ try{ window.GestorHistorial.cargarPagina(window.GestorHistorial.paginaActual||1) }catch(e){} },220); } catch(e){}
                    alert('Entrega registrada');
                } else {
                    alert('No fue posible registrar la entrega: ' + (data && data.error? data.error : 'error'));
                }
            }).catch(err => {
                t.disabled = false; t.textContent = 'Confirmar entrega'; console.error('Error entregar', err);
                if(err && err.status === 403){ console.error('Server returned HTML:', err.text); alert('Error CSRF o de permisos al registrar la entrega. Refresca la página e inténtalo de nuevo.'); }
                else if(err && err.text){ alert('Error del servidor: revisa la consola para más detalles.'); }
                else { alert('Error al registrar entrega'); }
            });
    }
});

// Intercept original entregar flow in the main modal: open preview instead
// (removed duplicate interceptor)
</script>
