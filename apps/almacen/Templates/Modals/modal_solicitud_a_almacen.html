</div>

<div id="modalFormularioSolicitud" class="modal-solicitud-almacen" style="z-index:3500;">
    <div class="overlay-modal" data-cerrar-formulario="true"></div>
    <div class="contenedor-centrado">
        <div class="modal-solicitud-dialog" role="document" tabindex="-1" style="width:50vw;height:50vh;padding:0;">
            <button type="button" class="boton-cerrar-modal" data-cerrar-formulario="true" aria-label="Cerrar formulario">&times;</button>
            <div class="encabezado-modal">
                <div class="contenido-encabezado">
                    <h2 class="titulo-modal">Solicitar producto</h2>
                </div>
            </div>
            <div class="cuerpo-modal" style="padding:24px; background:transparent;">
                <form id="formularioSolicitudModal" class="formulario-solicitud">
                    <div class="grupo-formulario">
                        <label for="cantidadSolicitudModal" class="etiqueta-formulario">Cantidad:</label>
                        <input type="number" min="1" step="1" inputmode="numeric" id="cantidadSolicitudModal" name="cantidad" class="entrada-formulario" required />
                    </div>
                    <div class="grupo-formulario">
                        <label for="descripcionSolicitudModal" class="etiqueta-formulario">Descripción (opcional):</label>
                        <textarea id="descripcionSolicitudModal" name="descripcion" class="area-texto-formulario" rows="2"></textarea>
                    </div>
                    <input type="hidden" id="idProductoSolicitudModal" name="producto" />
                    <div class="acciones-formulario">
                        <button type="submit" class="boton boton-primario">Enviar Solicitud</button>
                        <button type="button" class="boton boton-secundario" id="botonCancelarSolicitudModal">Cancelar</button>
                    </div>
                </form>
                <div id="retroalimentacionSolicitudModal" style="margin-top:16px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
// =============================================================================
// CONSTANTES Y CONFIGURACIÓN
// =============================================================================
const TIPOS_PRODUCTO_PERMITIDOS = ["ALIMENTOS_FRESCOS", "ALIMENTOS_SECOS", "BEBIDAS", "INSUMOS_COCINA"]

const ENDPOINTS = {
    PRODUCTOS: '/almacen/obtener_productos_para_solicitud/',
    SOLICITUD: '/almacen/solicitar_productos/'
};

// Módulo que será enviado al backend para marcar el movimiento
const MODULO_DESTINO = 'RESTAURANTE';

const SELECTORES = {
    MODAL_PRINCIPAL: '#modalSolicitudAlmacen',
    MODAL_FORMULARIO: '#modalFormularioSolicitud',
    INPUT_BUSQUEDA: '#inputBusquedaProductos',
    CONTENEDOR_TABLA: '#contenedorTablaProductos',
    CONTENEDOR_FILTROS: '#contenedorFiltros',
    PIE_TABLA: '#pieTablaProductos',
    FORMULARIO_MODAL: '#formularioSolicitudModal',
    TEXTO_FILTRO_ACTIVO: '#textoFiltroActivo',
    RETROALIMENTACION_MODAL: '#retroalimentacionSolicitudModal',
    LISTA_SELECCIONADOS: '#listaSeleccionados',
    BOTON_ENVIAR: '#botonEnviarSolicitud',
    BOTON_LIMPIAR: '#botonLimpiarSeleccion',
    DESCRIPCION: '#descripcionSolicitud',
    RETRO_FEED: '#retroalimentacionSolicitud'
};

// =============================================================================
// ESTADO GLOBAL
// =============================================================================
const EstadoSolicitud = {
    productoSeleccionado: null,
    filtroActual: null,
    busquedaActual: '',
    paginaActual: 1
};

// =============================================================================
// UTILIDADES
// =============================================================================
const Utilidades = {
    obtenerTokenCSRF() {
        return window.CSRF_TOKEN || '';
    },
    
    mostrarError(elemento, mensaje) {
        elemento.innerHTML = `<span style="color:var(--danger);">${mensaje}</span>`;
    },
    
    mostrarExito(elemento, mensaje) {
        elemento.innerHTML = `<span style="color:var(--success);">${mensaje}</span>`;
    },
    
    limpiarRetroalimentacion(elemento) {
        elemento.innerHTML = '';
    },
    
    construirParametrosBusqueda(filtro, busqueda, pagina) {
        const params = new URLSearchParams();
        TIPOS_PRODUCTO_PERMITIDOS.forEach(tipo => params.append('tipos', tipo));
        if (filtro) params.set('tipo', filtro);
        if (busqueda) params.set('busqueda', busqueda);
        if (pagina) params.set('page', pagina);
        return params;
    }
    ,
    validarCantidadEntera(valor) {
        // Acepta número o string; rechaza decimales, negativos y 0; devuelve entero >=1 o null si inválido
        if (valor === null || valor === undefined || valor === '') return null;
        const n = Number(valor);
        if (!Number.isFinite(n)) return null;
        const entero = Math.trunc(n);
        if (entero < 1) return null;
        return entero;
    }
};

// =============================================================================
// SERVICIO DE API
// =============================================================================
const ApiService = {
    async obtenerProductos(filtro = null, busqueda = '', pagina = 1) {
        try {
            const parametros = Utilidades.construirParametrosBusqueda(filtro, busqueda, pagina);
            const respuesta = await fetch(`${ENDPOINTS.PRODUCTOS}?${parametros.toString()}`);
            return await respuesta.json();
        } catch (error) {
            console.error('Error obteniendo productos:', error);
            throw new Error('No se pudieron cargar los productos');
        }
    },
    
    async enviarSolicitud(datosSolicitud) {
        try {
            // Asegurar que el campo 'modulo' esté presente en el FormData
            if (datosSolicitud instanceof FormData) {
                if (!datosSolicitud.get('modulo')) datosSolicitud.append('modulo', MODULO_DESTINO);
            }

            const respuesta = await fetch(ENDPOINTS.SOLICITUD, {
                method: 'POST',
                body: datosSolicitud,
                headers: { 
                    'X-CSRFToken': Utilidades.obtenerTokenCSRF() 
                }
            });
            return await respuesta.json();
        } catch (error) {
            console.error('Error enviando solicitud:', error);
            throw new Error('Error al enviar la solicitud');
        }
    }
};

// =============================================================================
// MANEJO DE LA INTERFAZ
// =============================================================================
const InterfazSolicitud = {
    inicializar() {
        this.configurarEventos();
        this.cargarProductos();
    // Renderizar selección previa (si hay) en UI
    this._renderizarSeleccionados();
    },
    
    configurarEventos() {
        // Evento de búsqueda
        document.querySelector(SELECTORES.INPUT_BUSQUEDA).addEventListener('input', (evento) => {
            EstadoSolicitud.busquedaActual = evento.target.value;
            EstadoSolicitud.paginaActual = 1;
            this.cargarProductos();
        });
        
        // Evento de envío del formulario
        document.querySelector(SELECTORES.FORMULARIO_MODAL).addEventListener('submit', (evento) => {
            evento.preventDefault();
            this.procesarSolicitud(evento.target);
        });
        
    // Eventos de cierre de modales
        this.configurarEventosCierre();

    // Eventos de selección/submit
    const btnEnviar = document.querySelector(SELECTORES.BOTON_ENVIAR);
    if (btnEnviar) btnEnviar.addEventListener('click', (e) => { e.preventDefault(); this.enviarSolicitudSeleccionada(); });
    const btnLimpiar = document.querySelector(SELECTORES.BOTON_LIMPIAR);
    if (btnLimpiar) btnLimpiar.addEventListener('click', (e) => { e.preventDefault(); this.limpiarSeleccion(); });
    },
    
    configurarEventosCierre() {
        // Cerrar modal principal
        document.querySelectorAll(`${SELECTORES.MODAL_PRINCIPAL} [data-cerrar-modal]`).forEach(boton => {
            boton.addEventListener('click', () => this.cerrarModalPrincipal());
        });
        
        // Cerrar modal de formulario
        document.querySelectorAll(`${SELECTORES.MODAL_FORMULARIO} [data-cerrar-formulario]`).forEach(boton => {
            boton.addEventListener('click', () => this.cerrarModalFormulario());
        });
        
        // Botón cancelar
        document.getElementById('botonCancelarSolicitudModal').addEventListener('click', () => {
            this.cerrarModalFormulario();
        });
    },
    
    async cargarProductos() {
        try {
            const datos = await ApiService.obtenerProductos(
                EstadoSolicitud.filtroActual,
                EstadoSolicitud.busquedaActual,
                EstadoSolicitud.paginaActual
            );
            
            if (datos.success) {
                this.actualizarInterfazProductos(datos);
            } else {
                throw new Error(datos.mensaje || 'Error al cargar productos');
            }
        } catch (error) {
            Utilidades.mostrarError(document.getElementById('retroalimentacionSolicitud'), error.message);
        }
    },
    
    actualizarInterfazProductos(datos) {
        document.querySelector(SELECTORES.CONTENEDOR_TABLA).innerHTML = datos.tabla_html || '';
        document.querySelector(SELECTORES.PIE_TABLA).innerHTML = datos.paginacion_html || '';
        
        this.configurarEventosTabla();
        this.configurarPaginacion();
    },
    
    configurarEventosTabla() {
        const contenedorTabla = document.querySelector(SELECTORES.CONTENEDOR_TABLA);

        // Usar delegación de eventos para los botones de seleccionar producto
        contenedorTabla.addEventListener('click', (evento) => {
            const boton = evento.target.closest('.boton-solicitar-producto, .btn-solicitar-producto, .btn-seleccionar-producto');
            if (boton) {
                const id = boton.dataset.id;
                const nombre = boton.dataset.nombre || boton.dataset.title || '';
                // Intentar leer input cantidad en la misma fila
                const fila = boton.closest('tr') || boton.closest('.producto-row');
                let cantidad = 1;
                if (fila) {
                    const inputQty = fila.querySelector('input[type="number"], .input-cantidad');
                    if (inputQty) cantidad = parseInt(inputQty.value || inputQty.getAttribute('value') || '1', 10) || 1;
                }
                this.agregarSeleccion({id: id, nombre: nombre, cantidad: cantidad});
            }
        });
    },
    
    configurarPaginacion() {
        // aceptar tanto la clase legacy .boton-paginacion como .pagination-btn usada en plantillas
        const botones = document.querySelectorAll(`${SELECTORES.PIE_TABLA} .boton-paginacion, ${SELECTORES.PIE_TABLA} .pagination-btn`);
        botones.forEach(boton => {
            // ignorar botones deshabilitados
            if (boton.disabled) return;
            boton.addEventListener('click', (evento) => {
                evento.preventDefault();

                // 1) Intentar leer dataset.data-page
                let pageAttr = boton.dataset.page || boton.getAttribute('data-page');

                // 2) Si no existe, intentar extraer el número del atributo onclick (p.e. cargarPagina('3'))
                if (!pageAttr) {
                    const onclick = boton.getAttribute('onclick') || '';
                    const m = onclick.match(/\(\s*['"]?(\d+)['"]?\s*\)/);
                    if (m) pageAttr = m[1];
                }

                // 3) Si sigue sin page, intentar usar el texto del botón si es numérico
                if (!pageAttr) {
                    const txt = (boton.textContent || '').trim();
                    if (/^\d+$/.test(txt)) pageAttr = txt;
                }

                if (!pageAttr) return; // no hay página válida

                EstadoSolicitud.paginaActual = parseInt(pageAttr, 10);
                this.cargarProductos();
            });
        });
    },
    
    seleccionarProducto(boton) {
        // Compatibilidad: abrir formulario individual
        EstadoSolicitud.productoSeleccionado = {
            id: boton.dataset.id,
            nombre: boton.dataset.nombre
        };
        document.getElementById('idProductoSolicitudModal').value = EstadoSolicitud.productoSeleccionado.id;
        document.querySelector(SELECTORES.FORMULARIO_MODAL).reset();
        this.mostrarModalFormulario();
    },

    // Gestión de selección múltiple
    agregarSeleccion(item) {
        if (!item || !item.id) return;
        const lista = this._obtenerListaSeleccionados();
        // intentar detectar stock actual desde la fila del producto si está presente en el DOM
        let stockDetectado = null;
        try {
            const selectors = [
                `tr[data-id="${item.id}"]`,
                `tr[data-producto-id="${item.id}"]`,
                `[data-id="${item.id}"]`,
                `[data-producto-id="${item.id}"]`,
                `#producto-${item.id}`
            ];
            let fila = null;
            for (const s of selectors) {
                fila = document.querySelector(s);
                if (fila) break;
            }
            if (fila) {
                // Priorizar dataset.stock
                if (fila.dataset && fila.dataset.stock != null && fila.dataset.stock !== '') {
                    stockDetectado = parseInt(String(fila.dataset.stock).replace(/[^0-9\-]/g, ''), 10);
                } else {
                    // buscar columnas que puedan contener la cantidad/stock
                    const posibles = fila.querySelectorAll('.stock, .cantidad, .cantidad-actual, td[data-stock]');
                    if (posibles && posibles.length) {
                        for (const p of posibles) {
                            const txt = (p.dataset && p.dataset.stock) ? p.dataset.stock : (p.textContent || p.innerText || '');
                            const n = parseInt(String(txt).replace(/[^0-9\-]/g, ''), 10);
                            if (!isNaN(n)) { stockDetectado = n; break; }
                        }
                    }
                }
            }
        } catch (e) { stockDetectado = null; }

        const existente = lista.find(i => String(i.id) === String(item.id));
        if (existente) {
            existente.cantidad = (parseInt(existente.cantidad,10) || 0) + (parseInt(item.cantidad,10) || 0);
            // actualizar stock si hemos detectado uno nuevo
            if (stockDetectado != null) existente.stock = stockDetectado;
        } else {
            lista.push({id: item.id, nombre: item.nombre || '', cantidad: parseInt(item.cantidad,10) || 1, stock: (stockDetectado != null ? stockDetectado : null)});
        }
        this._guardarListaSeleccionados(lista);
        this._renderizarSeleccionados();
    },

    quitarSeleccion(productoId) {
        let lista = this._obtenerListaSeleccionados();
        lista = lista.filter(i => String(i.id) !== String(productoId));
        this._guardarListaSeleccionados(lista);
        this._renderizarSeleccionados();
    },

    actualizarCantidad(productoId, cantidad) {
        const lista = this._obtenerListaSeleccionados();
        const it = lista.find(i => String(i.id) === String(productoId));
        if (it) {
            // Normalizar: eliminar decimales y valores negativos, mínimo 1
            let n = Number(cantidad);
            if (!Number.isFinite(n)) n = parseInt(cantidad,10) || 1;
            n = Math.trunc(n);
            if (isNaN(n) || n < 1) n = 1;
            it.cantidad = n;
            this._guardarListaSeleccionados(lista);
            this._renderizarSeleccionados();
        }
    },

    _obtenerListaSeleccionados() {
        try { return JSON.parse(localStorage.getItem('solicitud_seleccion')) || []; } catch(e) { return []; }
    },

    _guardarListaSeleccionados(lista) {
        try { localStorage.setItem('solicitud_seleccion', JSON.stringify(lista)); } catch(e) {}
    },

    _renderizarSeleccionados() {
        const cont = document.querySelector(SELECTORES.LISTA_SELECCIONADOS);
        const texto = document.getElementById('textoSinSeleccion');
        const lista = this._obtenerListaSeleccionados();
        cont.innerHTML = '';
        if (!lista.length) {
            if (texto) texto.style.display = '';
            return;
        }
        if (texto) texto.style.display = 'none';

        let total = 0;
        lista.forEach(item => {
            total += (parseInt(item.cantidad,10) || 0);
            const div = document.createElement('div');
            div.className = 'selected-item';
            div.innerHTML = `
                <div class="selected-meta">
                    <span class="name">${item.nombre || ('#' + item.id)}</span>
                    <span class="sub">ID: ${item.id}</span>
                </div>
                <div class="selected-qty">
                    <input type="number" min="1" value="${item.cantidad}" data-producto="${item.id}" class="input-cantidad" />
                </div>
                <div class="selected-actions">
                    <button class="selected-remove" data-producto="${item.id}">Quitar</button>
                </div>
            `;
            cont.appendChild(div);
        });

        // footer con total (sin botones duplicados)
        const footer = document.createElement('div');
        footer.className = 'seleccion-footer';
        footer.innerHTML = `
            <div class="total">Total unidades: <span id="totalUnidades">${total}</span></div>
        `;
        cont.appendChild(footer);

        // eventos para inputs: sanitizar en input y change
        cont.querySelectorAll('.input-cantidad').forEach(inp => {
            // prevenir decimales/negativos mientras se escribe
            inp.addEventListener('input', (e) => {
                const raw = e.target.value;
                // eliminar caracteres no numéricos excepto signo y punto
                let cleaned = String(raw).replace(/[^0-9.-]/g, '');
                // eliminar decimales truncando en el primer punto
                if (cleaned.indexOf('.') !== -1) cleaned = cleaned.split('.')[0];
                // eliminar signos negativos
                cleaned = cleaned.replace(/-/g, '');
                if (cleaned === '') cleaned = '1';
                e.target.value = cleaned;
            });
            inp.addEventListener('change', (e) => {
                const id = e.target.dataset.producto;
                // validar y forzar entero >=1
                const valid = Utilidades.validarCantidadEntera(e.target.value);
                if (valid === null) {
                    e.target.value = '1';
                } else {
                    e.target.value = String(valid);
                }
                this.actualizarCantidad(id, e.target.value);
                // actualizar total
                const tot = cont.querySelectorAll('.input-cantidad');
                let s=0; tot.forEach(x=> s += parseInt(x.value||0,10));
                const totalElem = document.getElementById('totalUnidades'); if (totalElem) totalElem.textContent = s;
            });
        });
        cont.querySelectorAll('.selected-remove').forEach(b => {
            b.addEventListener('click', (e) => {
                const id = e.target.dataset.producto;
                this.quitarSeleccion(id);
            });
        });
        
    },

    limpiarSeleccion() {
        this._guardarListaSeleccionados([]);
        this._renderizarSeleccionados();
    },

    async enviarSolicitudSeleccionada() {
        const lista = this._obtenerListaSeleccionados();
        if (!lista.length) {
            Utilidades.mostrarError(document.querySelector(SELECTORES.RETRO_FEED), 'No hay productos seleccionados.');
            return;
        }
        // Sincronizar cantidades desde los inputs visibles (por si usuario no hizo blur)
        try {
            const inputs = document.querySelectorAll(`${SELECTORES.LISTA_SELECCIONADOS} .input-cantidad`);
            inputs.forEach(inp => {
                const id = inp.dataset.producto;
                const listaItem = lista.find(i => String(i.id) === String(id));
                if (listaItem) {
                    // aplicar la misma normalización usada en change
                    const valid = Utilidades.validarCantidadEntera(inp.value);
                    if (valid === null) {
                        // dejar el valor tal cual para que la validación global lo detecte
                        listaItem.cantidad = inp.value;
                    } else {
                        listaItem.cantidad = valid;
                        inp.value = String(valid);
                    }
                }
            });
        } catch (e) { /* ignore */ }

        // Validar cantidades: enteras >=1
        const invalidos = [];
        lista.forEach(item => {
            const valid = Utilidades.validarCantidadEntera(item.cantidad);
            if (valid === null) invalidos.push({id: item.id, nombre: item.nombre || ('#'+item.id), valor: item.cantidad});
            else item.cantidad = valid; // normalizar
        });
        if (invalidos.length) {
            let msg = 'Corrige las cantidades de los siguientes productos (deben ser enteros >= 1):\n\n';
            invalidos.forEach(i => msg += `- ${i.nombre} (ID:${i.id}): "${i.valor}"\n`);
            window.alert(msg);
            Utilidades.mostrarError(document.querySelector(SELECTORES.RETRO_FEED), 'Hay cantidades inválidas en la selección.');
            this._guardarListaSeleccionados(lista); this._renderizarSeleccionados();
            return;
        }
        // Verificar cantidades solicitadas contra stock conocido
        const excedidos = [];
        lista.forEach(item => {
            const qty = parseInt(item.cantidad || 0, 10) || 0;
            const stock = (item.stock != null) ? (parseInt(item.stock || 0, 10) || 0) : null;
            if (stock != null && qty > stock) {
                excedidos.push({id: item.id, nombre: item.nombre || ('#'+item.id), solicitado: qty, disponible: stock});
            }
        });
        if (excedidos.length) {
            // Construir mensaje legible y mostrar alert; no continuar con el envío
            let mensaje = 'No se puede enviar la solicitud porque la cantidad solicitada supera el stock disponible:\n\n';
            excedidos.forEach(it => {
                mensaje += `- ${it.nombre} (ID: ${it.id}): solicitado ${it.solicitado}, disponible ${it.disponible}\n`;
            });
            // mostrar alert para que el usuario corrija cantidades
            window.alert(mensaje);
            // también mostrar en la retroalimentación
            Utilidades.mostrarError(document.querySelector(SELECTORES.RETRO_FEED), 'Hay productos con cantidad mayor al stock disponible.');
            return;
        }
        const descripcion = document.querySelector(SELECTORES.DESCRIPCION) ? document.querySelector(SELECTORES.DESCRIPCION).value : '';
        const payload = new FormData();
        payload.append('descripcion', descripcion);
        const cruceroElem = document.querySelector('[data-crucero-id], [data-current-crucero-id]');
        if (cruceroElem) {
            const cid = cruceroElem.dataset.cruceroId || cruceroElem.dataset.currentCruceroId;
            if (cid) payload.append('crucero_id', cid);
        }
        payload.append('productos', JSON.stringify(lista));
        try {
            Utilidades.limpiarRetroalimentacion(document.querySelector(SELECTORES.RETRO_FEED));
            // Asegurar que el módulo venga en el payload (consistente con ApiService.enviarSolicitud)
            if (!payload.get('modulo')) payload.append('modulo', MODULO_DESTINO);
            const resp = await fetch(ENDPOINTS.SOLICITUD, {
                method: 'POST',
                body: payload,
                headers: { 'X-CSRFToken': Utilidades.obtenerTokenCSRF() }
            });
            const datos = await resp.json();
            if (datos.success) {
                this.limpiarSeleccion();
                document.querySelector(SELECTORES.DESCRIPCION).value = '';
                Utilidades.mostrarExito(document.querySelector(SELECTORES.RETRO_FEED), 'Solicitud creada correctamente. ID: ' + (datos.solicitud_id || ''));
            } else {
                Utilidades.mostrarError(document.querySelector(SELECTORES.RETRO_FEED), datos.mensaje || 'Error al crear la solicitud');
            }
        } catch (error) {
            Utilidades.mostrarError(document.querySelector(SELECTORES.RETRO_FEED), error.message || 'Error en la solicitud');
        }
    },
    
    async procesarSolicitud(formulario) {
        Utilidades.limpiarRetroalimentacion(document.querySelector(SELECTORES.RETROALIMENTACION_MODAL));
        
        try {
            // Validar cantidad del formulario (evitar decimales/negativos)
            const campoCantidad = formulario.querySelector('input[name="cantidad"]');
            if (campoCantidad) {
                const valid = Utilidades.validarCantidadEntera(campoCantidad.value);
                if (valid === null) {
                    const msg = 'La cantidad debe ser un número entero mayor o igual a 1.';
                    window.alert(msg);
                    Utilidades.mostrarError(document.querySelector(SELECTORES.RETROALIMENTACION_MODAL), msg);
                    return;
                }
                campoCantidad.value = String(valid);
            }
            const datosFormulario = new FormData(formulario);
            const resultado = await ApiService.enviarSolicitud(datosFormulario);
            
            if (resultado.success) {
                this.solicitudExitosa();
            } else {
                Utilidades.mostrarError(
                    document.querySelector(SELECTORES.RETROALIMENTACION_MODAL),
                    resultado.mensaje || 'Error al procesar la solicitud'
                );
            }
        } catch (error) {
            Utilidades.mostrarError(
                document.querySelector(SELECTORES.RETROALIMENTACION_MODAL),
                error.message
            );
        }
    },
    
    solicitudExitosa() {
        this.cerrarModalFormulario();
        Utilidades.mostrarExito(
            document.getElementById('retroalimentacionSolicitud'),
            'Solicitud realizada correctamente.'
        );
        this.cargarProductos();
    },
    
    mostrarModalFormulario() {
    const el = document.querySelector(SELECTORES.MODAL_FORMULARIO);
    if (el) el.classList.add('active');
    },
    
    cerrarModalFormulario() {
    const el = document.querySelector(SELECTORES.MODAL_FORMULARIO);
    if (el) el.classList.remove('active');
    const form = document.querySelector(SELECTORES.FORMULARIO_MODAL);
    if (form) form.reset();
        EstadoSolicitud.productoSeleccionado = null;
    },
    
    cerrarModalPrincipal() {
    const el = document.querySelector(SELECTORES.MODAL_PRINCIPAL);
    if (el) el.classList.remove('active');
    },
    
    abrirModalPrincipal() {
        this.reiniciarEstado();
        this.cargarProductos();
    const el = document.querySelector(SELECTORES.MODAL_PRINCIPAL);
    if (el) el.classList.add('active');
    },
    
    reiniciarEstado() {
        EstadoSolicitud.productoSeleccionado = null;
        EstadoSolicitud.filtroActual = null;
        EstadoSolicitud.busquedaActual = '';
        EstadoSolicitud.paginaActual = 1;
        
        document.querySelector(SELECTORES.INPUT_BUSQUEDA).value = '';
        Utilidades.limpiarRetroalimentacion(document.getElementById('retroalimentacionSolicitud'));
    }
};

// =============================================================================
// INICIALIZACIÓN
// =============================================================================
document.addEventListener('DOMContentLoaded', () => {
    InterfazSolicitud.inicializar();
});

// Exponer función global para abrir el modal
window.abrirModalSolicitudAlmacen = () => {
    InterfazSolicitud.abrirModalPrincipal();
};
</script>
