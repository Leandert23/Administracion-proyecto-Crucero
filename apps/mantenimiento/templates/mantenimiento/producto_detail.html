{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>{{ producto.nombre }}</h2>
  <p><strong>Categoría:</strong> {{ producto.get_categoria_display }}</p>
  <p><strong>Unidad:</strong> {{ producto.get_unidad_display }}</p>
  <p><strong>Activo:</strong> {{ producto.activo|yesno:"Sí,No" }}</p>
  <div class="mt-3">
    <a class="btn btn-secondary" href="{% url 'mantenimiento:producto_list' %}">Volver</a>
  </div>
</div>
{% endblock %}
