{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>Eliminar Producto</h2>
  <p>¿Seguro que deseas eliminar el producto "{{ producto.nombre }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Eliminar</button>
    <a class="btn btn-secondary" href="{% url 'mantenimiento:producto_detail' producto.pk %}">Cancelar</a>
  </form>
</div>
{% endblock %}
