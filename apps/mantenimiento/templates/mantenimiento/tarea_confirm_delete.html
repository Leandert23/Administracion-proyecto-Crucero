{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>Eliminar Tarea</h2>
  <p>¿Seguro que deseas eliminar la tarea "{{ tarea.titulo }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Eliminar</button>
    <a class="btn btn-secondary" href="{% url 'mantenimiento:tarea_detail' tarea.pk %}">Cancelar</a>
  </form>
</div>
{% endblock %}
