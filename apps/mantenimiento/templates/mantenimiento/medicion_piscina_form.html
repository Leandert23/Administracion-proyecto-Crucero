{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2 class="mb-3">Registrar Medición de Piscina</h2>
  <form method="post" class="card p-3">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Guardar</button>
      <a class="btn btn-secondary" href="{% url 'mantenimiento:piscina_list' %}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
