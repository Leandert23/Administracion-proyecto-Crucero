{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>Tareas Pendientes</h2>
  <ul>
    {% for t in tareas_pendientes %}
      <li>{{ t.titulo }} - {{ t.fecha_programada|date:'Y-m-d H:i' }}</li>
    {% empty %}
      <li>Sin tareas pendientes</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
