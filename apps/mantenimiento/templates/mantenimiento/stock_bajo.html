{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2>Productos con Stock Bajo</h2>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Producto</th>
        <th>Tipo Crucero</th>
        <th>Stock</th>
        <th>Mínimo</th>
      </tr>
    </thead>
    <tbody>
      {% for inv in inventarios %}
      <tr>
        <td>{{ inv.producto.nombre }}</td>
        <td>{{ inv.tipo_crucero.tipo }}</td>
        <td>{{ inv.stock_actual }}</td>
        <td>{{ inv.stock_minimo }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="4" class="text-center">Sin alertas</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
