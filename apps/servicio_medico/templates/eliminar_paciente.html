{% extends 'layouts/base.html' %}
{% block content %}
<h2>Eliminar Historial Médico</h2>
<p>¿Estás seguro de que deseas eliminar el historial médico de <strong>{{ paciente.nombres }} {{ paciente.primer_apellido }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'historial_medico' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
