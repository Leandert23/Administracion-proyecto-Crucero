<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos Personalizados</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="reservas-bg">

  <header class="reservas-header">
    <div>
      <h1 class="reservas-title">Eventos Personalizados</h1>
      <p class="reservas-subtitle">Crucero: {{ crucero|title }}</p>
    </div>
    <div class="user-info">
      <a href="{% url 'reservas' %}">
        <button class="btn-primary">⬅ Volver a Reservas</button>
      </a>
    </div>
  </header>

  <div class="reservas-grid">
    {% for ev in eventos %}
      <div class="reserva-card opcion">
        <h3>{{ ev.nombre }}</h3>
        <p>{{ ev.descripcion }}</p>
        <p><strong>Materiales:</strong> {{ ev.materiales }}</p>
        <p><strong>Día:</strong> {{ ev.dia }}</p>
        <p><strong>Estado:</strong> {{ ev.estado }}</p>
        <a href="{% url 'cancelar_reserva' crucero ev.id %}">
          <button class="btn-danger">Cancelar</button>
        </a>
      </div>
    {% empty %}
      <p style="color:white;">No hay eventos personalizados todavía.</p>
    {% endfor %}
  </div>

  <div style="text-align:center; margin-top:20px;">
    <a href="{% url 'crear_evento_personalizado' crucero %}">
      <button class="btn-primary">Organizar un evento</button>
    </a>
  </div>

</body>
</html>
