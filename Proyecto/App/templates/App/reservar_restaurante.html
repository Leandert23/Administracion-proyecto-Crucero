<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservación de Restaurante</title>
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #093958 0%, #11406b 100%);
      min-height: 100vh;
      color: white;
    }
    
    .reservas-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d3b66;
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      margin: 20px;
      margin-bottom: 30px;
    }
    
    .reservas-title {
      margin: 0;
      font-size: 1.8rem;
    }

    .reservas-subtitle {
      margin: 0;
      font-size: 1rem;
      opacity: 0.8;
    }
    
    .user-info {
      color: white;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .restaurantes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .restaurante-card {
      background: #f6fafd;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(9,57,88,0.075);
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 2px solid transparent;
      text-align: center;
      color: #1e293b;
    }
    
    .restaurante-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(9,57,88,0.15);
      border-color: rgba(9, 57, 88, 0.1);
    }
    
    .restaurante-card h3 {
      font-size: 1.5rem;
      margin-top: 0;
      margin-bottom: 15px;
    }
    
    .restaurante-card button {
      margin-top: 15px;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      background: #2563eb;
      color: white;
      font-size: 1rem;
    }
    
    .restaurante-card button:hover {
      transform: scale(1.05);
      background: #1e40af;
    }
    
    @media (max-width: 768px) {
      .reservas-header {
        flex-direction: column;
        text-align: center;
        gap: 15px;
      }
      
      .user-info {
        align-items: center;
      }
      
      .restaurantes-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header class="reservas-header">
    <div>
      <h1 class="reservas-title">Reservación de Restaurante</h1>
      <p class="reservas-subtitle">
        Crucero: Vision of the Seas | Día 3 de 7
      </p>
    </div>
    <div class="user-info">
      <a href="reservas.html">
        <button class="btn-primary">⬅ Volver a Reservas</button>
      </a>
    </div>
  </header>

  <div class="restaurantes-grid">
    <!-- Primer restaurante -->
    <div class="restaurante-card">
      <h3>L'odissea della Toscana</h3>
      <button>Reservar Mesa</button>
    </div>

    <!-- Segundo restaurante -->
    <div class="restaurante-card">
      <h3>Odessa Al-Bahr</h3>
      <button>Reservar Mesa</button>
    </div>
  </div>

</body>
</html>
